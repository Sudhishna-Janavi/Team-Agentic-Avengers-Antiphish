<!DOCTYPE html>
<html>
<head>
    <title>Threat Detected | Antiphish</title>
    <style>
        body { 
            background: #c0392b; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
        }
        .container { text-align: center; max-width: 600px; padding: 40px; background: rgba(0,0,0,0.1); border-radius: 20px; }
        .icon { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 32px; margin-bottom: 10px; }
        p { font-size: 18px; line-height: 1.6; margin-bottom: 30px; opacity: 0.9; }
        .actions { display: flex; gap: 20px; justify-content: center; }
        button { 
            padding: 15px 30px; 
            border-radius: 8px; 
            border: none; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        .btn-safe { background: white; color: #c0392b; }
        .btn-danger { background: transparent; color: white; border: 2px solid white; }
    </style>
</head>
<body>
    <div class="container">
        <img src="icons/phishing.png" alt="Warning Icon" class="icon">
        <h1>Phishing Threat Blocked</h1>
        <p>Antiphish has detected high-risk signals on this page. Access has been restricted to protect your credentials and data privacy.</p>
        <div class="actions">
            <button class="btn-safe" id="back-safe">Back to Safety</button>
            <button class="btn-danger" id="proceed">Proceed Anyway (At Risk)</button>
        </div>
    </div>
    <script src="warning.js"></script>
</body>
</html>
